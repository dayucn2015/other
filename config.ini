; ==================== 主控与自动化策略组 ====================
custom_proxy_group=🚀 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`url-test`(?i)^(?!.*(家宽|住宅|residential)).*`https://cp.cloudflare.com/generate_204`300,,50

; ==================== 特殊节点组 ====================
custom_proxy_group=🏠 家宽节点`select`(?i)(家宽|住宅|residential)

; ==================== 五大主流国家区域 ====================
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)^(?!.*(家宽|住宅|residential))(.*(🇭🇰|香港|\bHK\b|hongkong)).*`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾节点`url-test`(?i)^(?!.*(家宽|住宅|residential))(.*(🇹🇼|台湾|\bTW\b|taiwan|hinet|taipei)).*`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)^(?!.*(家宽|住宅|residential))(.*(🇯🇵|日本|\bJP\b|tokyo|osaka)).*`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(?i)^(?!.*(家宽|住宅|residential))(.*(🇸🇬|新加坡|\bSG\b|singapore)).*`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)^(?!.*(家宽|住宅|residential))(.*(🇺🇸|美国|\bUS\b|united states|los angeles|san jose|seattle|new york)).*`https://cp.cloudflare.com/generate_204`300,,50

; ==================== 🧊 冷门节点池 ====================
custom_proxy_group=🧊 冷门节点`select`(?i)^(?!.*(家宽|住宅|residential|🇭🇰|香港|\bHK\b|hong\s*kong|🇯🇵|日本|\bJP\b|tokyo|osaka|🇹🇼|台湾|\bTW\b|taiwan|taipei|hinet|🇸🇬|新加坡|\bSG\b|singapore|🇺🇸|美国|\bUS\b|united\s*states|los\s*angeles|san\s*jose|seattle|new\s*york)).*

; ==========================================================
;设置分组标志位结束


;下方参数请勿修改
enable_rule_generator=true
overwrite_original_rules=true
